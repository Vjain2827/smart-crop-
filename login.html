<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Crop Advisor — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="loginstyle.css">
</head>
<body>

  <div id="toast"></div>

  <div class="card">

    <div class="lang-bar">
      <button type="button" id="enBtn" class="active" onclick="setLang('en')">EN</button>
      <button type="button" id="hiBtn" onclick="setLang('hi')">हिंदी</button>
    </div>

    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C12 22 4 16 4 9C4 5.13 7.13 2 11 2C14.87 2 18 5.13 18 9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 22C12 22 20 16 20 9" stroke="#8BC34A" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="22" x2="12" y2="10" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 3"/>
        </svg>
      </div>
      <div class="logo-text" id="logoText">
        Smart Crop Advisor
        <span id="logoSub">Powered by AI</span>
      </div>
    </div>

    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
    </div>

    <div id="screenPhone" class="section">
      <h2 class="form-title" id="formTitle">Welcome back</h2>
      <p class="form-subtitle" id="formSub">Enter your details to continue</p>

      <div class="field" id="nameField" style="display:none;">
        <label id="labelName">Full Name</label>
        <input type="text" id="name" autocomplete="name" placeholder="Rajan Kumar">
        <p class="field-msg hint" id="nameMsg"></p>
      </div>

      <div class="field">
        <label id="labelPhone">Phone Number</label>
        <div class="phone-wrap">
          <span class="phone-prefix">🇮🇳 +91</span>
          <input type="tel" id="phone" maxlength="10" inputmode="numeric" placeholder="9876543210">
        </div>
        <p class="field-msg hint" id="phoneMsg"></p>
      </div>

      <button type="button" class="btn-primary" id="btnSendOtp" onclick="sendOTP()">
        <span class="btn-label" id="btnSendLabel">Send OTP</span>
        <div class="spinner"></div>
      </button>

      <div class="aux-row">
        <span class="muted" id="switchHint">New here?</span>
        <a href="javascript:void(0)" onclick="toggleMode()" id="switchLink">Sign Up instead</a>
      </div>
    </div>

    <div id="screenOtp" class="section" style="display:none;">
      <h2 class="form-title" id="otpTitle">Verify OTP</h2>
      <p class="form-subtitle" id="otpSub">Sent to <strong id="phoneDisplay"></strong></p>

      <div class="field">
        <label id="labelOtp">One-Time Password</label>
        <div class="otp-group">
          <input type="tel" class="otp-digit" maxlength="1" inputmode="numeric" id="o1">
          <input type="tel" class="otp-digit" maxlength="1" inputmode="numeric" id="o2">
          <input type="tel" class="otp-digit" maxlength="1" inputmode="numeric" id="o3">
          <input type="tel" class="otp-digit" maxlength="1" inputmode="numeric" id="o4">
        </div>
        <p class="field-msg hint" id="otpMsg"></p>
      </div>

      <button type="button" class="btn-primary" id="btnVerify" onclick="verifyOTP()">
        <span class="btn-label" id="btnVerifyLabel">Verify & Continue</span>
        <div class="spinner"></div>
      </button>

      <div class="aux-row">
        <span class="muted" id="resendHint">Didn't receive it?</span>
        <a href="javascript:void(0)" id="resendLink" onclick="resendOTP()">Resend OTP</a>
      </div>
    </div>

  </div>

  <script src="loginscript.js"></script>
</body>
</html>
